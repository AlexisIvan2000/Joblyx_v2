name: frontend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.3
  url_launcher: ^6.3.2
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  riverpod: ^3.2.1
  flutter_riverpod: ^3.2.1
  file_picker: ^9.2.1
  http_parser: ^4.1.2
  image_picker: ^1.2.1
  shared_preferences: ^2.3.5
  cached_network_image: ^3.4.1
  web_socket_channel: ^3.0.2
  app_links: ^7.0.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.6
  build_runner: ^2.4.15
  http_mock_adapter: ^0.6.1
  integration_test:
    sdk: flutter
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/joblyx_logo.png"
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/joblyx_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/joblyx_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/en.json
    - assets/i18n/fr.json
    - assets/images/first_page_icon.svg
    - assets/images/email_icon.svg
    - assets/images/linkedin_logo.svg
    - assets/images/joblyx_logo.png
    - assets/images/processing.svg
    - assets/data/skills.json

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-Italic.ttf
          style: italic
